name: Feature Request
description: Suggest a new feature or improvement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an improvement to MemoSift!

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem are you trying to solve? Describe the use case, not just the solution.
      placeholder: "When compressing conversations with heavy code output, I lose..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How would you like this to work?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What other approaches have you tried or considered?

  - type: dropdown
    id: area
    attributes:
      label: Area
      description: Which part of MemoSift does this affect?
      options:
        - Core pipeline
        - Compression engine
        - Framework adapter
        - Configuration / presets
        - Anchor Ledger
        - Performance
        - TypeScript implementation
        - Documentation
        - Other
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Any other information, screenshots, or examples.
